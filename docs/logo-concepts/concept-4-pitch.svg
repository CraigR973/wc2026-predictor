<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Steele Spreadsheet System — pitch as spreadsheet grid">
  <title>The Steele Spreadsheet System — pitch as spreadsheet grid</title>
  <!-- Dark variant -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0B0E13"/>

  <!-- Pitch outline (rounded rect, brass) -->
  <rect x="80" y="128" width="352" height="256" rx="12" stroke="#D4A24A" stroke-width="8" fill="none"/>

  <!-- Centre line -->
  <line x1="256" y1="128" x2="256" y2="384" stroke="#D4A24A" stroke-width="8"/>

  <!-- Centre circle -->
  <circle cx="256" cy="256" r="48" stroke="#D4A24A" stroke-width="8" fill="none"/>

  <!-- Spreadsheet row hints — dashed thin lines across the pitch.
       Three subtle rows to nod at a sheet without overwhelming the pitch metaphor. -->
  <g stroke="#D4A24A" stroke-width="2" stroke-dasharray="3 7" opacity="0.35">
    <line x1="80" y1="192" x2="432" y2="192"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="320" x2="432" y2="320"/>
  </g>

  <!-- Penalty box outlines (two short verticals near each end) — quietly suggests football -->
  <g stroke="#D4A24A" stroke-width="6" fill="none">
    <path d="M 80 200 H 128 V 312 H 80"/>
    <path d="M 432 200 H 384 V 312 H 432"/>
  </g>

  <!-- Ball -->
  <circle cx="256" cy="256" r="12" fill="#D4A24A"/>
</svg>
