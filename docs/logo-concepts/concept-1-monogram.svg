<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Steele Spreadsheet System — S-cubed monogram">
  <title>The Steele Spreadsheet System — S³ monogram</title>
  <!-- Background: dark variant (iOS app-icon style rounded square) -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0B0E13"/>
  <!-- Brass type group; positioned on the optical centre line of the canvas -->
  <g fill="#D4A24A" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Heavy S -->
    <text x="206" y="368" font-size="340" font-weight="700" letter-spacing="-0.06em">S</text>
    <!-- Small exponent 3, sitting above the S baseline -->
    <text x="358" y="226" font-size="148" font-weight="600">3</text>
  </g>
</svg>
