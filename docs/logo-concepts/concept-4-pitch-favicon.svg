<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Steele Spreadsheet System — favicon">
  <title>The Steele Spreadsheet System — favicon</title>

  <!--
    Simplified favicon companion for Concept 4.
    The full pitch detail disappears below 64 px; this variant strips back
    to the two most readable elements: the centre-circle outline and the
    solid ball. Reads as "football" at 16 px while staying on-brand.
  -->

  <rect width="512" height="512" rx="96" ry="96" fill="#0B0E13"/>

  <!-- Centre circle — generous stroke so it reads at 16 px -->
  <circle cx="256" cy="256" r="148"
          stroke="#D4A24A" stroke-width="28" fill="none"/>

  <!-- Ball -->
  <circle cx="256" cy="256" r="52" fill="#D4A24A"/>

  <!-- Pentagon panel on ball — visible at 32 px+ -->
  <path d="M 256 228 L 232 247 L 241 275 L 271 275 L 280 247 Z"
        fill="#0B0E13"/>
</svg>
