<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Steele Spreadsheet System — bold S letterform with football panel">
  <title>The Steele Spreadsheet System — bold S letterform</title>
  <!-- Dark variant -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0B0E13"/>

  <!-- Heavy slab S — drawn as a single thick stroke path for cleaner edges -->
  <!-- The path traces a stylised S whose internal counter forms a pentagonal football panel.
       Stroke-based for cleaner scaling. -->
  <path d="
        M 380 158
        C 380 110, 322 96, 256 96
        C 188 96, 134 142, 134 200
        C 134 252, 178 282, 230 282
        L 282 282
        C 334 282, 378 312, 378 364
        C 378 422, 324 466, 256 466
        C 190 466, 132 446, 132 402
       "
       fill="none"
       stroke="#D4A24A"
       stroke-width="56"
       stroke-linecap="round"
       stroke-linejoin="round"/>

  <!-- Negative-space pentagon: a small football panel sits in the optical centre,
       cut into the lower curve of the S for the "found detail" moment -->
  <path d="M 256 218 L 226 244 L 238 282 L 274 282 L 286 244 Z"
        fill="#0B0E13"
        stroke="#0B0E13"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Pentagon outline at brass so it reads as part of the mark, not a hole -->
  <path d="M 256 218 L 226 244 L 238 282 L 274 282 L 286 244 Z"
        fill="none"
        stroke="#D4A24A"
        stroke-width="6"
        stroke-linejoin="round"/>
</svg>
