<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Steele Spreadsheet System — ticked football">
  <title>The Steele Spreadsheet System — ticked football (playful)</title>
  <!-- Dark variant -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0B0E13"/>

  <!-- Football body — single brass stroke circle -->
  <circle cx="256" cy="256" r="172" stroke="#D4A24A" stroke-width="14" fill="none"/>

  <!-- Central pentagon panel — single panel, off-centred, gives the "football" cue -->
  <path d="M 256 174 L 188 224 L 214 304 L 298 304 L 324 224 Z"
        fill="none"
        stroke="#D4A24A"
        stroke-width="12"
        stroke-linejoin="round"/>

  <!-- The tick mark — drawn boldly over the panel so it reads as
       "ticked off the prediction". Slightly oversize, slightly playful angle. -->
  <path d="M 178 270 L 232 330 L 350 200"
        fill="none"
        stroke="#D4A24A"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
