name: _tmp token2 check
# THROWAWAY: verifies CLAUDE_CODE_OAUTH_TOKEN_2 authenticates. Triggered via a
# temp PR (a supported event). Delete the branch + close the PR after — never merged.
on:
  pull_request:
    types: [opened, reopened, synchronize]
permissions:
  contents: read
  pull-requests: write
  id-token: write
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Auth-check second Pro token
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          prompt: "Reply with exactly the text TOKEN2_OK and nothing else."
