name: Deploy staging

# Auto-deploys the staging branch to https://wc2026-staging.vercel.app
# (the wc2026-staging Vercel project) as a PRODUCTION-target deployment, so
# CORS works and the canonical staging URL is always up to date.
#
# Triggers when the CI workflow finishes successfully on the staging branch.
# Won't fire if any CI job fails — tests + lint + typecheck are a hard gate.
#
# Needs the VERCEL_TOKEN secret on the repo
# (https://vercel.com/account/tokens → "Create" → add to
# https://github.com/CraigR973/wc2026-predictor/settings/secrets/actions).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to wc2026-staging.vercel.app
    runs-on: ubuntu-latest
    # workflow_run triggers fire for ALL branches CI ran on — gate strictly.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'staging'
      )
    env:
      VERCEL_ORG_ID: team_MVQMOaFtYHlwO5QVzSOZQ0Ud
      VERCEL_PROJECT_ID: prj_hVMpuWm33XjuNrVUWrCti27ZfIX7
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, default ref is the workflow file's
          # branch (main). We want the staging commit that CI just validated.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel build env (production target)
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (production)
        working-directory: apps/web
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        id: deploy
        working-directory: apps/web
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

      - name: Summary
        run: |
          echo "### Staging deploy ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL**: https://wc2026-staging.vercel.app" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Direct**: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${{ github.event.workflow_run.head_sha || github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
