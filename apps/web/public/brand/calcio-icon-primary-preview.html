<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calcio Icon Primary Preview</title>
    <style>
      :root {
        color: #f8f5ed;
        background: #0d1424;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 48px;
      }

      main {
        display: grid;
        gap: 32px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .previews {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 32px;
      }

      .preview {
        display: grid;
        gap: 12px;
        justify-items: center;
      }

      .preview img {
        display: block;
        width: var(--size);
        height: var(--size);
      }

      .label {
        color: #aeb8cc;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Calcio Icon Primary</h1>
      <section class="previews" aria-label="Icon size previews">
        <div class="preview" style="--size: 512px">
          <img src="./calcio-icon-primary.svg" alt="Calcio icon at 512 pixels" />
          <span class="label">512px</span>
        </div>
        <div class="preview" style="--size: 256px">
          <img src="./calcio-icon-primary.svg" alt="Calcio icon at 256 pixels" />
          <span class="label">256px</span>
        </div>
        <div class="preview" style="--size: 128px">
          <img src="./calcio-icon-primary.svg" alt="Calcio icon at 128 pixels" />
          <span class="label">128px</span>
        </div>
        <div class="preview" style="--size: 64px">
          <img src="./calcio-icon-primary.svg" alt="Calcio icon at 64 pixels" />
          <span class="label">64px</span>
        </div>
        <div class="preview" style="--size: 32px">
          <img src="./calcio-icon-primary.svg" alt="Calcio icon at 32 pixels" />
          <span class="label">32px</span>
        </div>
      </section>
    </main>
  </body>
</html>
