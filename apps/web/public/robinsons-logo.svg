<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 145" role="img" aria-label="Robinsons">
  <defs>
    <!--
      Arch centre: (110, 145) — at the bottom edge.
      Gold outer r=110 → top at y=35.  Gold inner r=67 → top at y=78.
      Green outer r=106 → top at y=39. Green inner r=69 → top at y=76.
      Text arc r=85 → top at y=60 (midpoint of the band).
    -->
    <path id="rob-arc" d="M 25 145 A 85 85 0 0 1 195 145"/>
  </defs>

  <!-- Gold border arch (outer r=110, inner r=67) -->
  <path fill="#C8A232" fill-rule="evenodd"
    d="M 0 145 A 110 110 0 0 1 220 145 Z
       M 43 145 A 67 67 0 0 1 177 145 Z"/>

  <!-- Dark green arch fill, inset inside the gold border -->
  <path fill="#1C5C28" fill-rule="evenodd"
    d="M 4 145 A 106 106 0 0 1 216 145 Z
       M 41 145 A 69 69 0 0 1 179 145 Z"/>

  <!-- ROBINSONS text on the arc -->
  <text fill="white" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-weight="900" font-size="17" letter-spacing="2.5">
    <textPath href="#rob-arc" startOffset="50%" text-anchor="middle">ROBINSONS</textPath>
  </text>

  <!-- Leaf stem rising from the arch top -->
  <line x1="110" y1="35" x2="110" y2="24"
        stroke="#1C5C28" stroke-width="3" stroke-linecap="round"/>

  <!-- Leaf: two overlapping ellipses rotated in opposite directions -->
  <ellipse cx="105" cy="13" rx="9" ry="16" fill="#267A22"
           transform="rotate(20 105 13)"/>
  <ellipse cx="115" cy="13" rx="9" ry="16" fill="#2E8E28"
           transform="rotate(-20 115 13)"/>

  <!-- Leaf centre vein -->
  <line x1="110" y1="24" x2="110" y2="2"
        stroke="#1A5C18" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
</svg>
