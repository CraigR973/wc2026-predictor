<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Pre-mount theme apply — read stored preference (or system pref for
      // 'system'/unset) and set the html class + color-scheme before React
      // mounts. Prevents a flash of the wrong palette on cold load.
      (function () {
        try {
          var stored = localStorage.getItem('sss_theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved =
            stored === 'light' ? 'light' :
            stored === 'dark' ? 'dark' :
            stored === 'system' ? (systemDark ? 'dark' : 'light') :
            'dark'; // default for first-time visitors: dark (matches ThemeContext)
          var html = document.documentElement;
          html.classList.remove('light', 'dark');
          html.classList.add(resolved);
          html.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0B0E13' : '#F7F8FA');
        } catch (e) { /* localStorage may be unavailable */ }
      })();
    </script>
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0E13" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SSS" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>The Steele Spreadsheet System</title>
    <meta name="description" content="The Steele Spreadsheet System — a private prediction league for the 2026 FIFA World Cup. Invite-only." />
    <meta property="og:title" content="The Steele Spreadsheet System" />
    <meta property="og:description" content="A private prediction league for the 2026 FIFA World Cup. Invite-only." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Steele Spreadsheet System" />
    <meta name="twitter:description" content="A private prediction league for the 2026 FIFA World Cup. Invite-only." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
