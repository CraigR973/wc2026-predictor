<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Pre-mount theme apply — read stored preference (or system pref for
      // 'system'/unset) and set the html class + color-scheme before React
      // mounts. Prevents a flash of the wrong palette on cold load.
      (function () {
        try {
          var stored = localStorage.getItem('sss_theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved =
            stored === 'light' ? 'light' :
            stored === 'dark' ? 'dark' :
            stored === 'system' ? (systemDark ? 'dark' : 'light') :
            'dark'; // default for first-time visitors: dark (matches ThemeContext)
          var html = document.documentElement;
          html.classList.remove('light', 'dark');
          html.classList.add(resolved);
          html.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#071A3D' : '#F7F8FA');
        } catch (e) { /* localStorage may be unavailable */ }
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#071A3D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Calcio" />
    <title>Calcio</title>
    <meta name="description" content="Calcio — a private prediction league for the 2026 FIFA World Cup. Invite-only." />
    <meta property="og:title" content="Calcio" />
    <meta property="og:description" content="A private prediction league for the 2026 FIFA World Cup. Invite-only." />
    <meta property="og:image" content="/brand/calcio-icon-primary-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Calcio" />
    <meta name="twitter:description" content="A private prediction league for the 2026 FIFA World Cup. Invite-only." />
    <meta name="twitter:image" content="/brand/calcio-icon-primary-512.png" />
    <!-- Dev-only mock bypass: if __wc2026_dev_mock__ is in sessionStorage this
         script sets up fake auth + a fetch interceptor before React mounts so
         the dashboard can be previewed without real credentials.
         Remove this block (and the sessionStorage entry) before shipping. -->
    <script>
      (function () {
        try {
          var raw = sessionStorage.getItem('__wc2026_dev_mock__');
          if (!raw) return;
          var cfg = JSON.parse(raw);
          localStorage.setItem('wc2026_access', cfg.token);
          localStorage.setItem('wc2026_refresh', 'dev-refresh');
          localStorage.setItem('wc2026_player', JSON.stringify(cfg.player));
          var _f = window.fetch;
          window.fetch = function (input, init) {
            var url = (input instanceof Request ? input.url : String(input));
            var ok = function (d) {
              return Promise.resolve(new Response(JSON.stringify(d), {
                status: 200, headers: { 'Content-Type': 'application/json' }
              }));
            };
            var routes = cfg.routes;
            for (var i = 0; i < routes.length; i++) {
              if (url.indexOf(routes[i].match) !== -1) return ok(routes[i].data);
            }
            if (url.indexOf('/api/v1/auth/') !== -1) {
              return ok({ access_token: cfg.token, refresh_token: 'dev-refresh' });
            }
            return _f.call(this, input, init);
          };
        } catch (e) { /* silent */ }
      })();
    </script>
    <!-- Preload the splash-critical font weight so the LCP wordmark paints
         without a render-blocking round-trip. The woff2 is self-hosted and
         precached by the service worker. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/jetbrains-mono-600.woff2"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
